interface:
  display_name: Facebook Group Monitor V6.6.4
  short_description: Facebook game-group monitor with safe aliases and regional adjudication
  default_prompt: 按 V6.6.4 流程运行 Facebook 群组监测。短拉丁别名必须使用完整词边界，不能以子串方式命中更长单词或编号续接；兄弟排斥必须包含兄弟游戏本名、别名和配置变体。多个明确国家若属于同一业务区域，应直接保留该区域并标记 same_business_region。最终明细以 group_url + game_name 为唯一键，多游戏群组分别保留。任务启动必须隔离 supervisor 与 child 日志；关机前使用 Node verifier 严格校验，默认完成后不关机。语义顺序为自定义 API、已验证 Codex CLI、本地规则与受控 GeoNames。
