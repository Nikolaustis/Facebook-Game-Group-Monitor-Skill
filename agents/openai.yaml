version: 1
display_name: Facebook Group Monitor V5.2.1
short_description: 严格版 Facebook 游戏群组监测技能，支持精确短代码边界、GeoNames 泛词防误判、群名城市/省州识别、自动 GeoNames 兜底、蒙古语/俄语区分、阈值门控人工复核及 XLSX/JSON 审计输出。
default_prompt: 按 V5.2.1 流程运行 Facebook 群组监测。先执行登录阶段；在用户回复“已登录”前不要搜索、采集、分析或生成报告。第二轮地区判断必须先使用严格本地规则，再对经过安全过滤的疑似地名调用 GeoNames；不得把 de、TM、Come、Gift 等普通词或符号当作地区；人工复核候选必须先通过成员规模与活跃度门槛。
