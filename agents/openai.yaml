version: 1
display_name: Facebook Group Monitor V5.0
short_description: 严格版 Facebook 游戏群组监测技能，支持兄弟游戏硬排斥、Unicode 标题匹配、语言/地区识别（含 GeoNames 外部地理解析兜底、蒙古语/俄语西里尔文区分与 About 所在地兜底）、人工复核队列和 XLSX/JSON 输出。
default_prompt: 按 V5.0 流程运行 Facebook 群组监测。先执行登录阶段；在用户回复“已登录”前不要搜索、采集、分析或生成报告。登录后按第一轮原词搜索、停止确认、第二轮严格筛选执行，并只输出 Excel 工作簿与 JSON 审计文件，不读写或保存 CSV。
