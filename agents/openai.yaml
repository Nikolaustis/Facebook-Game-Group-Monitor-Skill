interface:
  display_name: Facebook Group Monitor V6.5.4
  short_description: API-first semantic Facebook game-group monitoring with verified fallback and durable recovery.
  default_prompt: 按 V6.5.4 流程运行 Facebook 群组监测。语义提供方固定为自定义 API、已验证的独立 Codex CLI、本地规则与受控 GeoNames。API 返回有效但低置信度结果时继续回退，不应判定为 API 调用失败。每个候选后保存完整 checkpoint。默认完成后不关机；根据用户本次文本生成 shutdown_policy.json。正常完成后关闭 Chrome 并删除本次计划任务。
