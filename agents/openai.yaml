version: 1
display_name: Facebook Group Monitor V6.0.0
short_description: 严格版 Facebook 游戏群组监测技能，支持任务计划程序重启续跑、逐候选完整断点、运行期电源保护、任务自删除及严格关机校验。
default_prompt: 按 V6.0.0 流程运行 Facebook 群组监测。第二轮默认必须通过 Windows 任务计划程序启动；每个候选后完整保存 detail/manual_review/stats/cursor；恢复只能使用完整 checkpoint；运行期间启用防睡眠与待关机取消保护；任务正常执行结束后必须自删除；只有全部最终文件、finalized 状态、completion token 与 Chrome 关闭状态均通过时才允许完成后关机，任何失败不得直接回退关机。先执行登录阶段；在用户回复“已登录”前不要搜索、采集、分析或生成报告。第二轮必须先用第一轮候选卡片中的群名执行相关性预筛；群名完整且完全无目标标题、别名、受控变体、兄弟标题或 IP root 证据时，直接跳过，不得打开 About 或讨论页；缺失/截断群名及人工复核型弱命中继续进入原有验证链路。第二轮地区判断必须先使用群名明确地区，再使用 About Location、本地/GeoNames 和高确定性语言；只有这些均无结果时，才对经过安全过滤且已剔除全部已知游戏实体词的群名候选调用 GeoNames；群名 GeoNames 必须精确名称匹配；多词地点不得降级成单词；游戏实体融合 token 必须整词丢弃；不得把 de、TM、ID、MY、Come、Gift、jual、mua、ซื้อขาย、عشاق 等普通词、代码或符号当作地区；人工复核候选必须先通过成员规模与活跃度门槛；孤立 ID 不得解释为印度尼西亚，群名出现多个不同地区证据时必须先用 About 所在地裁决；语言识别前必须剔除当前游戏名称，K/L 指标列必须输出为 0.00% 百分比格式；manual_review 的 A:AE 必须与 detail 完全一致，人工复核专属字段从 AF 开始追加。 若同一运行目录存在未完成 checkpoint，默认自动续跑；仅当用户明确要求从头开始时使用 FreshStart。GeoNames alternateNames 必须兼容字符串、数组和对象，不得因非字符串字段终止整轮任务。
